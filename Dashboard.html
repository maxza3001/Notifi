<div class="glass-panel rounded-xl p-4 sm:p-6">
  <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
    <div>
      <h2 class="text-xl font-bold text-blue-900 flex items-center gap-2">
        <i class="ph ph-list-dashes"></i> รายการคำขอทั้งหมด
      </h2>
      <p class="text-sm text-gray-500 mt-1">
        รายการทั้งหมด: <span id="totalCount" class="font-bold text-blue-600">0</span> รายการ
        <span class="ml-3 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800 animate-pulse">
          <span class="w-2 h-2 mr-1 bg-green-500 rounded-full"></span> Live
        </span>
      </p>
    </div>
    
    <div class="flex gap-2 w-full sm:w-auto">
      <div class="relative w-full sm:w-64">
        <input type="text" id="searchInput" placeholder="ค้นหา ชื่อ, เลขบัตร..." 
          class="w-full pl-9 pr-4 py-2 border rounded-lg text-sm outline-none focus:border-blue-500">
        <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-gray-400"></i>
      </div>
      <button onclick="loadDashboardData()" class="px-3 py-2 bg-blue-100 text-blue-800 rounded-lg hover:bg-blue-200 transition" title="รีเฟรชข้อมูล">
        <i class="ph ph-arrows-clockwise"></i>
      </button>
    </div>
  </div>

  <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
    <select id="filterStatus" class="border rounded-lg px-3 py-1.5 text-sm outline-none bg-white min-w-[120px]">
      <option value="all">ทุกสถานะ</option>
      <option value="รออนุมัติ">รออนุมัติ</option>
      <option value="รับเรื่องแล้ว">รับเรื่องแล้ว</option>
      <option value="รอพิจารณา">รอพิจารณา</option>
      <option value="อนุมัติแล้ว">อนุมัติแล้ว</option>
    </select>
  </div>

  <div class="table-container overflow-x-auto rounded-lg border border-gray-200">
    <table class="min-w-full divide-y divide-gray-200 text-sm whitespace-nowrap">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">วันที่-เวลา</th>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">ชื่อ-นามสกุล</th>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">ส่วนราชการ</th>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">เลขบัตร (ปกปิด)</th>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">สถานะ</th>
          <th class="px-4 py-3 text-center font-semibold text-gray-600">จัดการ</th>
        </tr>
      </thead>
      <tbody id="tableBody" class="bg-white divide-y divide-gray-200">
        </tbody>
    </table>
    
    <div id="emptyState" class="hidden text-center py-10 text-gray-500">
      <i class="ph ph-file-x text-4xl mb-2 text-gray-300"></i>
      <p>ไม่พบข้อมูล</p>
    </div>
  </div>
</div>

<div id="statusModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[100] flex justify-center items-center px-4">
  <div class="bg-white rounded-xl max-w-md w-full p-6 shadow-2xl">
    <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">อัปเดตสถานะ</h3>
    
    <input type="hidden" id="modalRowNumber">
    
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">เปลี่ยนสถานะ</label>
      <select id="modalStatus" class="w-full px-3 py-2 border rounded-lg outline-none focus:border-blue-500">
        <option value="รออนุมัติ">รออนุมัติ</option>
        <option value="รับเรื่องแล้ว">รับเรื่องแล้ว</option>
        <option value="รอพิจารณา">รอพิจารณา</option>
        <option value="อนุมัติแล้ว">อนุมัติแล้ว</option>
      </select>
    </div>

    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-700 mb-1">หมายเหตุ (ถ้ามี)</label>
      <input type="text" id="modalNote" class="w-full px-3 py-2 border rounded-lg outline-none focus:border-blue-500" placeholder="ระบุเหตุผล...">
    </div>

    <div class="mb-6 flex items-center">
      <input type="checkbox" id="modalNotify" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500">
      <label for="modalNotify" class="ml-2 text-sm text-gray-700">ส่งแจ้งเตือน Telegram ด้วย</label>
    </div>

    <div class="flex justify-end gap-2">
      <button onclick="closeModal()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">ยกเลิก</button>
      <button onclick="saveStatus()" id="btnSaveStatus" class="px-4 py-2 btn-primary rounded-lg transition flex items-center gap-1">
        บันทึก
      </button>
    </div>
  </div>
</div>
